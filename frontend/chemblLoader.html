<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMolExplorer - ChEMBL Loader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='chemblLoader.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/icon.png') }}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header class="main-header">
        <div class="header-content">
            <a href="{{ url_for('index') }}" class="header-link-home">
                <img src="{{ url_for('static', filename='img/icon.png') }}" alt="BioMolExplorer Logo"
                    class="header-logo">
            </a>
            <h1>BioMolExplorer</h1>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('pdbLoader') }}">PDB Loader</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="page-title">ChEMBL Loader</h2>

        <div class="content-wrapper">
            <div class="form-container">
                <form id="chembl-form">

                    <div class="fieldset-row">
                        <fieldset>
                            <legend>Target Search</legend>
                            <div class="form-group">
                                <label for="target_name">Target Name</label>
                                <input type="text" id="target_name" name="target_name"
                                    placeholder="e.g., Acetylcholinesterase" required>
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend>Target Parameters</legend>
                            <div class="form-group">
                                <label for="organism">Organism</label>
                                <input type="text" id="organism" name="organism" value="Homo sapiens">
                            </div>
                        </fieldset>
                    </div>
                    

                    <fieldset>
                        <legend>Bioactivity Parameters</legend>
                        <div class="form-group">
                            <label>Standard Type (select at least one)</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="standard_type__in" value="IC50">IC50</label>
                                <label><input type="checkbox" name="standard_type__in" value="No. of survivors">No. of survivors</label>
                                <label><input type="checkbox" name="standard_type__in" value="Inhibition">Inhibition</label>
                                <label><input type="checkbox" name="standard_type__in" value="Activity">Activity</label>
                                <label><input type="checkbox" name="standard_type__in" value="Ki" checked> Ki</label>
                                <label><input type="checkbox" name="standard_type__in" value="Survival">Survival</label>
                                <label><input type="checkbox" name="standard_type__in" value="Kd">Kd</label>
                                <label><input type="checkbox" name="standard_type__in" value="Km">Km</label>
                                <label><input type="checkbox" name="standard_type__in" value="Imax"> Imax</label>
                                <label><input type="checkbox" name="standard_type__in" value="Reversibility">Reversibility</label>
                                <label><input type="checkbox" name="standard_type__in" value="Ratio">Ratio</label>
                                <label><input type="checkbox" name="standard_type__in" value="Concentration">Concentration</label>
                                <label><input type="checkbox" name="standard_type__in" value="Ratio IC50">Ratio IC50</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="max_value_ref">Max Value Reference (nM)</label>
                            <input type="number" id="max_value_ref" name="max_value_ref" value="1000">
                        </div>
                    </fieldset>

                    <div class="fieldset-row">
                        <fieldset>
                            <legend>Molecules Parameters</legend>
                            <div class="form-group">
                                <label for="natural_product_molecules">Natural Product</label>
                                <input type="checkbox" id="natural_product_molecules" name="natural_product_molecules">
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend>Similar Molecules Parameters</legend>
                            <div class="form-group">
                                <label for="similarity">Similarity (%)</label>
                                <input type="number" id="similarity" name="similarity" value="60" min="0" max="100">
                                <label for="molecule_weight">Max Molecule Weight (Daltons)</label>
                                <input type="number" id="molecule_weight" name="molecule_weight" value="500">
                            </div>
                        </fieldset>
                    </div>
                
                    <button type="submit">Run ChEMBL Loader</button>
                </form>

                <div id="response"></div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-left">
            <strong>BioMolExplorer</strong> · Version <span id="app-version">0.1</span>
            </div>
            <nav class="footer-links">
            <a href="#">About</a>
            <a href="#">References</a>
            <a href="#">Contact</a>
            </nav>
            <div class="footer-right">
            Copyright © {{ 2025 }} BioMolExplorer. All Rights Reserved.
            </div>
            <script defer src="{{ url_for('static', filename='js/common.js') }}"></script>

        </div>
    </footer>

    <script src="{{ url_for('static', filename='chemblLoader.js') }}"></script>
</body>

</html>
